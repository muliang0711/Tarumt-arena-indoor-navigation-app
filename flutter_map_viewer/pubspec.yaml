name: flutter_map_viewer
description: Indoor map viewer for loading a map image and navigation JSON from the village map editor.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/demo/sample_map.png
    - assets/maps/sample_map.json
    - assets/resources/serious_shit/
