<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Map Pipeline Test</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #1f2933;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: grab;
        image-rendering: pixelated;
      }

      canvas:active {
        cursor: grabbing;
      }
    </style>
  </head>
  <body>
    <canvas id="map-canvas" aria-label="Rendered indoor navigation map"></canvas>
    <script type="module">
      import { loadMapSchema } from "./shared/SchemaParser.js";
      import { loadAssets } from "./shared/AssetLoader.js";
      import { createTileGrid, LayerComposer } from "./map-renderer/index.js";
      import { loadBobSprites, selectBobSprite, verifyNodeACheck } from "./actor-system/index.js";
      import { buildNodePath, createBobAtNode, createNodeRouteRunner } from "./tmp-system/BobRouteRunner.js";
      import { Viewport } from "./camera-system/index.js";
      import { startRenderLoop } from "./renderLoop.js";

      const canvas = document.getElementById("map-canvas");

      try {
        const mapData = await loadMapSchema("assets/map.json");
        const assetBundle = await loadAssets(mapData, { basePath: "assets/" });
        const nodeACheck = verifyNodeACheck({ id: "a", x: 0.4, y: 0.4 }, mapData.movement.coordinateSystem.pixelsPerMeter);
        console.info("[map_pipeline_test] node a coordinate check:", nodeACheck);
        if (mapData.ambiguities.length > 0) {
          console.info("[map_pipeline_test] schema notes:", mapData.ambiguities);
        }
        if (assetBundle.missing.length > 0) {
          console.warn("[map_pipeline_test] missing assets:", assetBundle.missing.map((item) => item.url));
        }

        const grid = createTileGrid(mapData);
        const composer = new LayerComposer(mapData, assetBundle, grid);
        const viewport = new Viewport(canvas, { width: grid.worldWidth, height: grid.worldHeight }, composer.visualBounds);
        const bobSprites = await loadBobSprites();
        const bob = createBobAtNode(mapData, "node_1");
        const bobPath = buildNodePath(mapData, "node_1", "node_4");
        const bobRunner = createNodeRouteRunner(mapData, bob, bobPath, { speedMetersPerSecond: 1.4 });
        const actors = [bob];
        window.addEventListener("resize", () => viewport.resize());
        startRenderLoop(canvas, viewport, composer, {
          showCollision: false,
          showRoomZones: false,
          showRoutePath: false,
          showActors: true,
          showDisplayOverlay: true,
          actors,
          update({ deltaMs }) {
            bobRunner.update(deltaMs);
            bob.sprite = selectBobSprite(bobSprites, bob);
          },
        });
      } catch (error) {
        console.error("[map_pipeline_test] failed to start renderer:", error);
      }
    </script>
  </body>
</html>
